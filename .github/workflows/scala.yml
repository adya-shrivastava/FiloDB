name: CI

on:
  push:
    branches: [ develop ]
  pull_request:
    branches: [ develop, integration, main, feat-index-rust ]

jobs:
  test:

    runs-on: ubuntu-22.04

    steps:
    - name: Checkout
      uses: actions/checkout@v2
    - name: Set up JDK 21
      uses: actions/setup-java@v2
      with:
        java-version: '21'
        distribution: 'temurin'
    - name: Cache SBT dependencies
      uses: actions/cache@v4
      with:
        path: |
          ~/.ivy2/cache
          ~/.sbt/boot
          ~/.sbt/launchers
          ~/.coursier/cache
        key: ${{ runner.os }}-sbt-${{ hashFiles('**/build.sbt', '**/project/Dependencies.scala', '**/project/plugins.sbt', '**/project/build.properties') }}
        restore-keys: |
          ${{ runner.os }}-sbt-
    - name: Install Rust Toolchain
      uses: actions-rust-lang/setup-rust-toolchain@v1
      with:
        components: rustfmt, clippy
        target: x86_64-apple-darwin, aarch64-apple-darwin, aarch64-unknown-linux-gnu
        cache-workspaces: "core/src/rust -> target"
        toolchain: 1.83.0
    - name: Install cargo-zigbuild
      run: pip install cargo-zigbuild
    - name: Run tests
      uses: nick-fields/retry@v3
      env:
        # Default is 6; reduced to limit concurrent Maven Central connections to help prevent 429s.
        SBT_OPTS: "-Dsbt.coursier.parallel-download-count=3"
      with:
        timeout_minutes: 120
        max_attempts: 3
        retry_wait_seconds: 60
        command: .github/workflows/runtests.sh
    - name: Coverage Reports
      uses: actions/upload-artifact@v4
      with:
        name: scoverage-report
        path: target/scala-*/scoverage-report/**
